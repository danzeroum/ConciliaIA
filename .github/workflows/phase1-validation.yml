name: Phase 1 - Critical Fixes Validation

on:
  push:
    branches: [main, develop, feature/phase1-*]
  pull_request:
    branches: [main]

jobs:
  validate-phase1:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🧩 NEW: Enforce +x permission for all shell scripts (governance fix)
      - name: Enforce executable permission on shell scripts
        run: |
          echo "🔧 Verificando e corrigindo permissões executáveis..."
          find scripts -type f -name "*.sh" ! -perm -111 -exec chmod +x {} \;
          echo "✅ Permissões ajustadas (se necessário)."
          echo "📋 Scripts executáveis:"
          find scripts -type f -name "*.sh" -exec ls -l {} \;

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest jq yq bc

      - name: Run concurrency tests
        run: pytest -v tests/test_concurrency_control.py

      - name: Run prompt integrity tests
        run: pytest -v tests/test_prompt_integrity.py

      - name: Run ledger rotation tests
        run: pytest -v tests/test_ledger_rotation.py

      - name: Validate scripts syntax
        run: |
          bash -n scripts/orchestrator/*.sh
          bash -n scripts/governance/*.sh
          bash -n scripts/maintenance/*.sh
          bash -n scripts/providers/*.sh

      - name: Run health check
        run: bash scripts/maintenance/ledger-health-check.sh
