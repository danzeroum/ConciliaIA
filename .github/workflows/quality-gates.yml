name: Quality Gates

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests (87% coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/unit \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests

  accuracy-validation:
    name: Accuracy Validation (99.5%)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate synthetic dataset
        run: |
          python tests/datasets/generate_test_dataset.py

      - name: Run accuracy tests
        run: |
          pytest tests/accuracy -m critical --maxfail=1 -vv

      - name: Validate accuracy threshold
        run: |
          python tests/accuracy/validate_accuracy.py --threshold 0.995

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy report
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run security tests
        run: |
          pytest tests/security -m security -vv

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install locust

      - name: Run load tests
        run: |
          chmod +x tests/performance/run_load_tests.sh
          ./tests/performance/run_load_tests.sh
        env:
          API_URL: http://localhost:8000
        continue-on-error: true

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-reports
          path: tests/performance/results

  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - accuracy-validation
      - security-scan
      - performance-tests

    steps:
      - name: Summary
        run: |
          echo "## Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests" >> $GITHUB_STEP_SUMMARY
          echo "- Accuracy validation" >> $GITHUB_STEP_SUMMARY
          echo "- Security scan" >> $GITHUB_STEP_SUMMARY
          echo "- Performance checks" >> $GITHUB_STEP_SUMMARY
