name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  performance:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: conciliaai_test
          POSTGRES_USER: btv_user
          POSTGRES_PASSWORD: btv_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest-benchmark locust

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql+asyncpg://btv_user:btv_password@localhost:5432/conciliaai_test
        run: |
          pytest tests/performance/ -v -m performance --benchmark-only

      - name: Run stress tests
        env:
          DATABASE_URL: postgresql+asyncpg://btv_user:btv_password@localhost:5432/conciliaai_test
        run: |
          pytest tests/stress/ -v -m stress

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: |
            reports/
            htmlcov/

      - name: Performance regression check
        run: |
          python scripts/check_performance_regression.py

  load-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run K6 load tests
        run: |
          chmod +x scripts/run_k6_load_tests.sh
          ./scripts/run_k6_load_tests.sh

      - name: Upload load test results
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: reports/k6-*.json
