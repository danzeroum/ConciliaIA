name: Pipeline Bífido

on:
  pull_request:
  push:
    branches: [ main ]

# Evita cancelamentos por pushes subsequentes no mesmo PR/ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  sync-quality-gate:
    name: "🚦 Porteiro Rápido (Síncrono)"
    runs-on: ubuntu-latest
    # ↑ Aumentado de 3 para 20 para evitar cancelamento prematuro
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps (ethics + tests + gates)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-ethics.txt ]; then pip install -r requirements-ethics.txt; fi
          pip install pytest pyyaml
          # Lista de dependências consolidada (inclui pydantic para o slo.py)
          pip install fastapi "uvicorn[standard]" prometheus-client aiohttp httpx requests pydantic

      # --- FERRAMENTAS DE SCHEMA: Node (LTS) + yq pinado (sem sudo npm -g) ---
      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yq (pinned)
        run: |
          set -euo pipefail
          YQ_VERSION="v4.40.5"
          sudo curl -fsSL -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate Governance Config Schema (MELHORIA-001)
        id: validate_schema
        run: |
          set -euo pipefail
          echo "Validando .buildtovalue/config/governance.yaml..."
          # Converte YAML (yq v4) para /tmp/governance.json
          yq eval -o=json .buildtovalue/config/governance.yaml > /tmp/governance.json
          # Valida com ajv-cli via NPX (sem instalar global)
          npx --yes ajv-cli@5.0.0 validate \
            -s .buildtovalue/schemas/btv-governance.schema.json \
            -d /tmp/governance.json

      - name: Smoke tests (Ethics + Observability + SLO)
        env:
          PYTHONPATH: .  # Garante que 'src' seja importável
        run: |
          set -euo pipefail
          # Roda smoke tests (se existirem)
          if [ -f tests/ethics/test_pii_detector_smoke.py ]; then pytest -q tests/ethics/test_pii_detector_smoke.py; fi
          if [ -f tests/monitoring/test_metrics_smoke.py ]; then pytest -q tests/monitoring/test_metrics_smoke.py; fi
          if [ -f tests/ethics/test_ethics_slo_smoke.py ]; then pytest -q tests/ethics/test_ethics_slo_smoke.py; fi

      - name: Ensure gate script is executable
        run: chmod +x ./scripts/pipeline/sync-quality-gate.sh

      - name: Run Sync Gate (ALL gates)
        id: sync_gate
        env:
          PYTHONPATH: .  # Garante que 'src' seja importável
        run: |
          set -euo pipefail
          ./scripts/pipeline/sync-quality-gate.sh

      - name: Upload Ethics Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ethics-report
          path: reports/ethics-report.json
          retention-days: 90

      # Comentário no PR apenas se for PR e não vier de fork (evita 403)
      - name: Comment PR with Ethics Findings
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/ethics-report.json';
            let body = '⚠️ Ethics Guardian falhou, mas o relatório não foi encontrado.';
            if (fs.existsSync(path)) {
              const report = JSON.parse(fs.readFileSync(path, 'utf8'));
              body = [
                '## 🛡️ Ethics Guardian — Relatório (Gate Síncrono)',
                `**Status:** ❌ ${report.compliance_status}`,
                `**LGPD Risk:** ${report.lgpd_risk_level}`,
                '**Exposures**',
                `- Critical: ${report.by_severity?.critical ?? 0}`,
                `- High: ${report.by_severity?.high ?? 0}`,
                `- Medium: ${report.by_severity?.medium ?? 0}`,
                `- Low: ${report.by_severity?.low ?? 0}`,
                '**Top Files**',
                ...(report.top_files || []).map(t => `- \`${t.file}\`: ${t.count}`)
              ].join('\n');
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # --- ETAPA 5: ATIVAÇÃO DO AUDITOR PROFUNDO ---
  async-quality-audit:
    name: "🔍 Auditor Profundo (Assíncrono)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sync-quality-gate  # Depende do sucesso do Porteiro Rápido
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps (parity with sync)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-ethics.txt ]; then pip install -r requirements-ethics.txt; fi
          pip install pytest pyyaml
          pip install fastapi "uvicorn[standard]" prometheus-client aiohttp httpx requests pydantic

      - name: Ensure gate script is executable
        run: chmod +x ./scripts/pipeline/async-quality-audit.sh

      - name: Run Async Audit (Stub Implementations)
        id: async_gate
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          ./scripts/pipeline/async-quality-audit.sh
      # (TODO: Adicionar steps para upload de artifacts do async, como relatórios de mutação/bdd)
