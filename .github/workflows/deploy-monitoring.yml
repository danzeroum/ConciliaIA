name: 🚀 Deploy Monitoring Stack

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile.monitoring'
      - 'docker-compose.quality-intelligence.yml'
      - 'docker/grafana/**'
      - 'docker/prometheus/**'
      - 'scripts/monitoring/**'
      - '.github/workflows/deploy-monitoring.yml'
  workflow_dispatch:

env:
  STACK_NAME: btv-quality-intelligence

jobs:
  deploy-monitoring:
    name: 🚀 Deploy Monitoring Stack
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate configuration
      run: |
        docker-compose -f docker-compose.quality-intelligence.yml config

    - name: Deploy to monitoring environment
      run: |
        echo "🚀 Implantando stack de monitoramento..."
        docker-compose -f docker-compose.quality-intelligence.yml up -d
        
        echo "⏳ Aguardando serviços..."
        sleep 30
        
        echo "✅ Stack implantada:"
        echo "   Grafana: http://localhost:3000"
        echo "   Prometheus: http://localhost:9090"

    - name: Run monitoring setup script
      run: |
        chmod +x scripts/monitoring/setup-alerts.sh
        ./scripts/monitoring/setup-alerts.sh

    - name: Health check
      run: |
        timeout 30 bash -c 'until curl -f http://localhost:3000/api/health; do sleep 2; done'
        echo "✅ Grafana health check passed"
        
        timeout 30 bash -c 'until curl -f http://localhost:9090/-/healthy; do sleep 2; done'  
        echo "✅ Prometheus health check passed"
