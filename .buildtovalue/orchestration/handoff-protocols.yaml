handoff_protocols:
  integration_to_development:
    from: "ia-integration-specialist"
    to: "ia-developer"
    artifacts:
      required: ["normalized_transactions", "parser_logic"]
      optional: ["api_specs", "data_samples"]
    sla_hours: 4
    quality_criteria:
      - "Schema canônico válido (JSON Schema)"
      - "Parsing success rate > 99%"
      - "Documentação API completa"
    ciif_protocol:
      context: "Parser implementado e testado em staging"
      information: "Formato entrada/saída, edge cases conhecidos"
      intention: "Integrar parser no ReconciliationAgent"
      format: "Código Python + testes + docs"

  development_to_auditor:
    from: "ia-developer"
    to: "ia-auditor"
    artifacts:
      required: ["implementation", "data_flow", "dependencies"]
      optional: ["threat_model"]
    sla_hours: 2
    mandatory: true
    security_checklist:
      - "Zero credenciais hardcoded"
      - "Inputs validados (injection prevention)"
      - "Outputs sanitizados (XSS prevention)"
      - "Secrets em AWS Secrets Manager"
      - "PII criptografado"

  auditor_to_qa:
    from: "ia-auditor"
    to: "ia-qa"
    artifacts:
      required: ["security_clearance", "compliance_report"]
      optional: ["pentest_results"]
    sla_hours: 1
    qa_focus:
      - "Validar correções vulnerabilidades"
      - "Testes segurança automatizados"
      - "Regression test pós-fix"

  qa_to_ops:
    from: "ia-qa"
    to: "ia-ops"
    artifacts:
      required: ["quality_report", "test_results", "release_notes"]
      optional: ["performance_benchmarks"]
    sla_hours: 2
    readiness_checklist:
      - "Todos testes críticos verdes"
      - "Requisitos de performance cumpridos"
      - "Aprovação auditoria de segurança presente"

  ops_to_product_manager:
    from: "ia-ops"
    to: "ia-product-manager"
    artifacts:
      required: ["deployment_status", "rollout_plan"]
      optional: ["customer_impact_assessment"]
    sla_hours: 4
    communication_protocol:
      - "Atualizar stakeholders sobre disponibilidade"
      - "Registrar incidentes ocorridos"
      - "Confirmar monitoramento ativo"
