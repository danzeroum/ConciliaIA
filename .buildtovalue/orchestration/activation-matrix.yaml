# BuildToValue v7.0 - Activation Matrix
# Project: ConciliaAI - Sistema Agêntico de Reconciliação Financeira
# Domain: Fintech - Financial Reconciliation

version: "7.0"
project: "conciliaai"
updated_at: "2025-10-18T00:00:00Z"

routing_rules:
  acquirer_integration:
    primary_ia: "ia-integration-specialist"
    support_ias: ["ia-auditor", "ia-developer"]
    confidence_threshold: 0.80
    semantic_patterns:
      - "integrar {cielo|rede|stone|mercado pago}"
      - "conectar com adquirente"
      - "parser {edi|api} {adquirente}"
      - "sync data from acquirer"
      - "implementar conector"
    context_indicators:
      high_confidence: ["edi", "api", "acquirer", "parser", "integration"]
      medium_confidence: ["sync", "connector", "external"]
      low_confidence: ["data", "fetch"]
    mandatory_handoffs:
      - to: "ia-auditor"
        condition: "always"
        reason: "Security review credenciais adquirente"
      - to: "ia-developer"
        condition: "implementation_needed"
        reason: "Implementar parser/cliente API"
    auto_rag_query: "lessons learned parser {adquirente} edi api errors"

  transaction_reconciliation:
    primary_ia: "ia-business-analyst"
    support_ias: ["ia-developer", "ia-data-architect", "ia-qa"]
    confidence_threshold: 0.75
    semantic_patterns:
      - "reconciliar {vendas|transações|pagamentos}"
      - "matching transações"
      - "divergências entre {pos|ecommerce} e adquirente"
      - "calcular mdr {taxa|fee}"
      - "detectar discrepâncias"
    decision_flow:
      1_business_rules:
        ia: "ia-business-analyst"
        task: "Definir regras matching e critérios aceitação"
        artifacts: ["matching_rules", "acceptance_criteria"]
      2_implementation:
        ia: "ia-developer"
        task: "Implementar ReconciliationAgent com regras"
        artifacts: ["reconciliation_agent", "matching_algorithm"]
      3_data_quality:
        ia: "ia-data-architect"
        task: "Validar qualidade dados e acurácia"
        artifacts: ["quality_metrics", "accuracy_report"]
      4_testing:
        ia: "ia-qa"
        task: "Validar precisão 99.5%+"
        artifacts: ["test_results", "edge_cases_coverage"]
    quality_gates:
      matching_accuracy: 0.995
      false_positive_rate: 0.01
      processing_time_ms: 100

  security_compliance:
    primary_ia: "ia-auditor"
    support_ias: ["ia-ethics-guardian", "ia-ops"]
    confidence_threshold: 0.85
    mandatory: true
    semantic_patterns:
      - "security {review|audit|check}"
      - "compliance {pci-dss|lgpd|gdpr}"
      - "is this secure"
      - "vulnerability {scan|test}"
      - "penetration test"
      - "dados sensíveis"
    triggers:
      automatic:
        - "before_production_deploy"
        - "after_new_integration"
        - "schema_change_with_pii"
        - "credentials_exposed_detected"
      manual:
        - "quarterly_audit"
        - "after_security_incident"
    veto_power: true
    autonomy_level: 5

  architecture_design:
    primary_ia: "ia-arquiteto"
    support_ias: ["ia-developer", "ia-ops", "ia-auditor"]
    confidence_threshold: 0.80
    semantic_patterns:
      - "arquitetura para {feature|sistema}"
      - "design {escalável|distribuído}"
      - "escolha {tecnologia|framework|banco}"
      - "padrões de {design|arquitetura}"
      - "multi-tenant"
    conflict_resolution:
      method: "weighted_voting"
      weights:
        ia-arquiteto: 0.40
        ia-developer: 0.25
        ia-ops: 0.25
        ia-auditor: 0.10
      escalation_threshold: 0.70

  development:
    primary_ia: "ia-developer"
    support_ias: ["ia-arquiteto", "ia-qa"]
    confidence_threshold: 0.75
    semantic_patterns:
      - "implementar {feature|função|componente}"
      - "codificar {algoritmo|lógica}"
      - "refatorar {código|módulo}"
      - "bug fix"
      - "otimizar performance"
    code_patterns:
      - "*.py"
      - "def |class "
      - "import langchain"
      - "async def"
    quality_requirements:
      test_coverage: 0.80
      code_smells: 0
      cognitive_complexity: 15
      duplication: 0.03

  quality_assurance:
    primary_ia: "ia-qa"
    support_ias: ["ia-developer", "ia-auditor"]
    confidence_threshold: 0.75
    semantic_patterns:
      - "testar {componente|feature}"
      - "validar {precisão|acurácia}"
      - "test {coverage|automation}"
      - "edge cases"
      - "performance test"
    test_strategy:
      unit_tests:
        target_coverage: 0.85
        owner: "ia-developer"
      integration_tests:
        scenarios: ["cielo_edi_parsing", "reconciliation_flow", "api_integration"]
        owner: "ia-qa"
      performance_tests:
        load: "10k transactions/min"
        latency_p95: "200ms"
        owner: "ia-qa"

  deployment_operations:
    primary_ia: "ia-ops"
    support_ias: ["ia-arquiteto", "ia-auditor"]
    confidence_threshold: 0.75
    semantic_patterns:
      - "deploy {para|to} {staging|production}"
      - "configurar {infra|ambiente}"
      - "monitoring {setup|config}"
      - "incident response"
      - "rollback"
    deployment_gates:
      - gate: "security_audit"
        owner: "ia-auditor"
        mandatory: true
      - gate: "quality_gates"
        owner: "ia-qa"
        threshold: 0.90
      - gate: "performance_benchmark"
        owner: "ia-ops"
        threshold: "p95 < 200ms"
    phases:
      phase_1_alpha:
        infra: "AWS Free Tier"
        automation: "Docker Compose"
      phase_2_beta:
        infra: "Multi-AZ + Aurora Serverless v2"
        automation: "Terraform + GitHub Actions"
      phase_3_growth:
        infra: "Auto-scaling + Redis Cluster"
        automation: "Kubernetes + ArgoCD"

  design:
    primary_ia: "ia-designer"
    support_ias: ["ia-product-manager", "ia-business-analyst"]
    confidence_threshold: 0.75
    semantic_patterns:
      - "design {dashboard|interface|tela}"
      - "ux para {feature}"
      - "protótipo {wireframe|mockup}"
      - "jornada usuário"
      - "acessibilidade"
    design_principles:
      - "Don't Make Me Think (Steve Krug)"
      - "Mobile-first"
      - "WCAG 2.1 AA compliance"

  data_governance:
    primary_ia: "ia-data-architect"
    support_ias: ["ia-auditor", "ia-ethics-guardian"]
    confidence_threshold: 0.75
    semantic_patterns:
      - "modelagem {dados|schema}"
      - "privacidade {dados|pii}"
      - "retenção dados"
      - "data {quality|governance}"
      - "lgpd {compliance|audit}"
    governance_rules:
      pii_handling:
        - "Encryption at rest: AES-256"
        - "Encryption in transit: TLS 1.3"
        - "Retention: 7 anos (Receita Federal)"
        - "Anonymization: logs e reports"
      data_quality:
        accuracy: 0.995
        completeness: 0.99
        timeliness: "< 24h"

  ethics_fairness:
    primary_ia: "ia-ethics-guardian"
    support_ias: ["ia-auditor", "ia-product-manager"]
    confidence_threshold: 0.85
    semantic_patterns:
      - "ética {review|check}"
      - "fairness {algoritmo|modelo}"
      - "bias {detection|mitigation}"
      - "transparência {ml|decisão}"
      - "discriminação"
    veto_power: true
    autonomy_level: 5
    ethics_checks:
      - "Algoritmo matching não discrimina por valor transação"
      - "Alertas de anomalia não viés geográfico/demográfico"
      - "Transparência: usuário entende por que foi alertado"

handoff_protocols:
  integration_to_development:
    from: "ia-integration-specialist"
    to: "ia-developer"
    artifacts:
      required: ["normalized_transactions", "parser_logic"]
      optional: ["api_specs", "data_samples"]
    sla_hours: 4
    quality_criteria:
      - "Schema canônico válido (JSON Schema)"
      - "Parsing success rate > 99%"
      - "Documentação API completa"
    ciif_protocol:
      context: "Parser implementado e testado em staging"
      information: "Formato entrada/saída, edge cases conhecidos"
      intention: "Integrar parser no ReconciliationAgent"
      format: "Código Python + testes + docs"

  development_to_auditor:
    from: "ia-developer"
    to: "ia-auditor"
    artifacts:
      required: ["implementation", "data_flow", "dependencies"]
      optional: ["threat_model"]
    sla_hours: 2
    mandatory: true
    security_checklist:
      - "Zero credenciais hardcoded"
      - "Inputs validados (injection prevention)"
      - "Outputs sanitizados (XSS prevention)"
      - "Secrets em AWS Secrets Manager"
      - "PII criptografado"

  auditor_to_qa:
    from: "ia-auditor"
    to: "ia-qa"
    artifacts:
      required: ["security_clearance", "compliance_report"]
      optional: ["pentest_results"]
    sla_hours: 1
    qa_focus:
      - "Validar correções vulnerabilidades"
      - "Testes segurança automatizados"
      - "Regression test pós-fix"

conflict_resolution:
  levels:
    level_1_debate:
      duration_minutes: 30
      method: "structured_debate"
      required_arguments: ["reasoning", "confidence", "evidence"]
    level_2_weighted_voting:
      weights_by_domain:
        architecture:
          ia-arquiteto: 0.40
          ia-developer: 0.25
          ia-ops: 0.25
          ia-auditor: 0.10
        security:
          ia-auditor: 0.60
          ia-ops: 0.20
          ia-developer: 0.10
          ia-ethics-guardian: 0.10
        business:
          ia-product-manager: 0.40
          ia-business-analyst: 0.30
          ia-designer: 0.20
          ia-developer: 0.10
      consensus_threshold: 0.80
    level_3_ml_prediction:
      enabled: true
      model: "historical_decision_predictor"
      confidence_threshold: 0.75
    level_4_human_escalation:
      triggers:
        - "No consensus after level 3"
        - "Business impact > $10k"
        - "Legal/compliance uncertainty"
      escalation_to: "PE"
      sla_hours: 24

auto_rag:
  enabled: true
  collections:
    lessons_learned:
      embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
      vector_dim: 384
      similarity_metric: "cosine"
      top_k: 3
    decisions:
      retention_days: 365
      indexed_fields: ["problem_type", "ias_involved", "outcome", "reasoning"]
    patterns:
      successful_patterns: true
      failure_patterns: true
      edge_cases: true
  search_strategy:
    semantic_search: true
    keyword_fallback: true
    hybrid_threshold: 0.70

cost_management:
  daily_limit_usd: 10.0
  per_decision_limit_usd: 0.20
  llm_selection:
    default: "openai_gpt4o_mini"
    by_task:
      simple_routing: "gpt-4o-mini"
      complex_reasoning: "gpt-4o"
      code_generation: "claude-3.5-sonnet"
      security_audit: "gpt-4o"
  caching:
    enabled: true
    ttl_hours: 24
    cache_keys: ["problem_hash", "context_hash"]
  budget_alerts:
    - threshold: 0.70
      action: "notify_pe"
    - threshold: 0.90
      action: "throttle_non_critical"
    - threshold: 1.00
      action: "pause_autonomous_decisions"

observability:
  tracing:
    enabled: true
    backend: "jaeger"
    sample_rate: 1.0
  metrics:
    - name: "routing_confidence"
      type: "histogram"
      labels: ["problem_type", "selected_ia"]
    - name: "handoff_duration_seconds"
      type: "histogram"
      labels: ["from_ia", "to_ia"]
    - name: "conflict_resolution_time_minutes"
      type: "histogram"
      labels: ["resolution_level"]
    - name: "quality_gate_pass_rate"
      type: "gauge"
      labels: ["gate_name"]
  dashboards:
    - name: "Squad Health"
      panels:
        - "Active IAs"
        - "Success rate per IA"
        - "Handoff efficiency"
        - "Conflict frequency"
    - name: "Business Metrics"
      panels:
        - "Reconciliation accuracy"
        - "Anomalies detected"
        - "Recovered revenue"
        - "Customer satisfaction"

priority_matrix:
  p0_critical:
    response_time_hours: 1
    ias: ["ia-auditor", "ia-ops"]
    examples:
      - "Security breach"
      - "Production down"
      - "Data loss"
      - "Compliance violation"
  p1_high:
    response_time_hours: 4
    ias: ["ia-integration-specialist", "ia-developer", "ia-auditor"]
    examples:
      - "Parser failure affecting clients"
      - "API integration broken"
      - "Reconciliation accuracy < 99%"
  p2_medium:
    response_time_hours: 24
    ias: ["ia-arquiteto", "ia-qa", "ia-designer"]
    examples:
      - "Performance optimization"
      - "New feature development"
      - "UX improvement"
  p3_low:
    response_time_days: 7
    ias: ["ia-product-manager", "ia-data-architect"]
    examples:
      - "Roadmap planning"
      - "Documentation update"
      - "Research spike"

domain_rules:
  financial_transactions:
    validation_rules:
      - "Amount always positive and <= 1M BRL"
      - "MDR rate between 0.5% and 10%"
      - "NSU unique per acquirer per day"
      - "Settlement date >= transaction date"
    anomaly_thresholds:
      high_severity:
        - "MDR variance > 20% from expected"
        - "Amount > R$ 10.000"
        - "Settlement delay > 90 days"
      medium_severity:
        - "MDR variance 10-20%"
        - "Amount R$ 1.000 - R$ 10.000"
        - "Settlement delay 30-90 days"
  acquirer_integrations:
    sla:
      cielo:
        edi_availability: 0.99
        api_availability: 0.95
        data_freshness_hours: 24
      rede:
        edi_availability: 0.98
        api_availability: 0.90
        data_freshness_hours: 24
      stone:
        api_availability: 0.97
        data_freshness_hours: 1
    fallback_strategy:
      - primary: "real_time_api"
      - secondary: "edi_d_plus_1"
      - tertiary: "manual_upload"
  compliance:
    mandatory_checks:
      - "PCI-DSS before production deploy"
      - "LGPD privacy assessment for new data"
      - "Security audit quarterly"
      - "Penetration test bi-annually"
    data_retention:
      transactions: "7 years (Receita Federal)"
      logs: "1 year (LGPD)"
      backups: "30 days (RPO compliance)"

learning_system:
  feedback_loops:
    - source: "human_override"
      action: "adjust_ia_confidence"
      weight: 0.8
    - source: "quality_gate_failure"
      action: "retrain_routing_model"
      weight: 0.6
    - source: "customer_satisfaction"
      action: "adjust_priority_matrix"
      weight: 0.5
  adaptation_triggers:
    - metric: "routing_accuracy"
      threshold: 0.80
      action: "retrain_model"
      frequency: "weekly"
    - metric: "handoff_efficiency"
      threshold: 0.85
      action: "optimize_protocols"
      frequency: "monthly"
  a_b_testing:
    enabled: true
    experiments:
      - name: "routing_strategy"
        variants: ["ml_based", "rule_based", "hybrid"]
        sample_size: 100
        duration_days: 14

emergency_protocols:
  production_incident:
    severity_p0:
      response_team: ["ia-ops", "ia-auditor", "PE"]
      response_time_minutes: 15
      actions:
        - "Assess impact (# affected clients, $ revenue)"
        - "Execute rollback if available"
        - "Activate fallback systems"
        - "Communicate status to stakeholders"
        - "Root cause analysis (within 24h)"
    severity_p1:
      response_team: ["ia-ops", "ia-developer"]
      response_time_hours: 1
      actions:
        - "Isolate affected component"
        - "Apply hotfix if possible"
        - "Monitor metrics closely"
        - "Schedule proper fix (within 48h)"
  security_incident:
    response_team: ["ia-auditor", "ia-ops", "PE"]
    phases:
      detection:
        - "Automated scan (GitGuardian, Snyk)"
        - "Manual report"
        - "Anomaly detection"
      containment:
        - "Revoke compromised credentials"
        - "Isolate affected systems"
        - "Preserve evidence"
      eradication:
        - "Remove threat"
        - "Patch vulnerabilities"
        - "Verify remediation"
      recovery:
        - "Restore normal operations"
        - "Monitor for recurrence"
        - "Lessons learned"
      communication:
        - "Internal: immediate"
        - "Customers: if data breach (< 72h LGPD)"
        - "Regulators: if required by law"

certification:
  squad_readiness:
    criteria:
      - "All 11 personas configured"
      - "Activation matrix validated"
      - "Handoff protocols tested"
      - "Auto-RAG indexed (> 50 decisions)"
      - "Quality gates passing (> 90%)"
    validation_steps:
      - "Route 20 test problems"
      - "Execute 5 end-to-end flows"
      - "Simulate 2 conflict scenarios"
      - "Test emergency protocols"
  compliance_certification:
    required:
      - "PCI-DSS v3.2.1 Level 1"
      - "LGPD compliant"
      - "OWASP Top 10 2021 validated"
    audit_frequency:
      - "Internal: monthly"
      - "External: quarterly"
      - "Penetration test: bi-annually"

