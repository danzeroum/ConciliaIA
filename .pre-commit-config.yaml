repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/psf/black
    rev: 23.11.0 # Use a versão do seu requirements-dev
    hooks:
    -   id: black
-   repo: https://github.com/pycqa/isort
    rev: 5.12.0 # Use a versão do seu requirements-dev
    hooks:
    -   id: isort
-   repo: https://github.com/pycqa/flake8
    rev: 6.1.0 # Use a versão do seu requirements-dev
    hooks:
    -   id: flake8
