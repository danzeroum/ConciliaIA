[alembic]
script_location = alembic
# URL de conexão com o container 'postgres'
sqlalchemy.url = postgresql+asyncpg://btv_user:btv_password@postgres:5432/conciliaai

# --- CORREÇÃO DA CONFIGURAÇÃO DE LOGGING ---

[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_alembic]
level = INFO
handlers = console
qualname = alembic
# Use propagate = 0 para evitar duplicidade de logs se a root logger também for usada
propagate = 0

[handler_console]
# Usa a classe base para streaming para o console
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
# Definição do formato do log
format = %(levelname)-5.5s [%(name)s] %(message)s