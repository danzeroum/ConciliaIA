# BuildToValue v7.4-Platinum - OpenTelemetry Configuration

service:
  name: buildtovalue
  version: v7.4-platinum-phase2
  environment: ${BTV_ENVIRONMENT:-production}

telemetry:
  enabled: ${BTV_TELEMETRY_ENABLED:-true}
  sampling_rate: ${BTV_SAMPLING_RATE:-1.0}

exporters:
  jaeger:
    enabled: ${BTV_JAEGER_ENABLED:-true}
    endpoint: ${BTV_JAEGER_ENDPOINT:-http://localhost:14268/api/traces}
    timeout: 10s

  otlp:
    enabled: ${BTV_OTLP_ENABLED:-false}
    endpoint: ${BTV_OTLP_ENDPOINT:-localhost:4317}
    protocol: grpc

  console:
    enabled: ${BTV_CONSOLE_EXPORTER:-false}

traces:
  max_span_attributes: 128
  max_event_attributes: 128
  max_link_attributes: 128

spans:
  processors:
    - type: batch
      max_queue_size: 2048
      schedule_delay: 5s
      export_timeout: 30s
      max_export_batch_size: 512

    - type: attributes
      actions:
        - key: btv.version
          value: v7.4-platinum
          action: insert
        - key: btv.phase
          value: "2"
          action: insert

resource_attributes:
  service.name: buildtovalue
  service.version: v7.4-platinum-phase2
  deployment.environment: ${BTV_ENVIRONMENT:-production}
  host.name: ${HOSTNAME}
  btv.governance.level: platinum

custom_dimensions:
  - task_id
  - task_type
  - mpaa_divergence
  - provider_used
  - security_profile
  - resource_profile
