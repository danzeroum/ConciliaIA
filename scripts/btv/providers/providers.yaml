providers:
  - name: ollama
    priority: 1
    type: local
    enabled: true
    models:
      generation: btv-gen
      audit: btv-audit
    endpoint: http://localhost:11434
    timeout: 30
    retry: 3

  - name: openai
    priority: 2
    type: external
    enabled: true
    models:
      generation: gpt-4
      audit: gpt-4-turbo
    api_key_env: OPENAI_API_KEY
    endpoint: https://api.openai.com/v1
    timeout: 45
    retry: 2
    cost_per_1k_tokens: 0.03

  - name: anthropic
    priority: 3
    type: external
    enabled: true
    models:
      generation: claude-sonnet-4-5-20250929
      audit: claude-sonnet-4-5-20250929
    api_key_env: ANTHROPIC_API_KEY
    endpoint: https://api.anthropic.com/v1
    timeout: 45
    retry: 2
    cost_per_1k_tokens: 0.015

fallback:
  enabled: true
  max_retries: 3
  backoff_seconds: 5

cost_tracking:
  enabled: true
  alert_threshold_usd: 10.0
  ledger_file: .buildtovalue/cost-ledger.jsonl
