[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: marca testes de integração
    unit: marca testes unitários
    accuracy: Accuracy validation tests
    performance: Performance tests
    stress: Stress tests
    load: Load tests
    slow: Slow tests (> 1 second)

# Default options. Coverage is intentionally NOT enforced here: the previous
# --cov-fail-under=87 was calibrated for a larger codebase and applied to every
# pytest invocation (including the separate integration run). Coverage is still
# collected/reported in CI's unit step (`--cov=src --cov-report=xml`) and
# uploaded to Codecov; raising the floor again is future work.
addopts =
    --verbose
    --strict-markers
    --tb=short

# Asyncio
asyncio_mode = auto
