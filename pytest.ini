[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    unit: Unit tests
    integration: Integration tests
    load: Load/performance tests
    slow: Slow tests (> 1s)
    critical: Critical quality gates
    security: Security validation tests
    e2e: End-to-end journeys

addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
