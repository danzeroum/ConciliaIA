[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    accuracy: Accuracy validation tests
    performance: Performance tests
    stress: Stress tests
    load: Load tests
    slow: Slow tests (> 1 second)

# Coverage
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=87

# Asyncio
asyncio_mode = auto

# Performance test options
performance_repeat = 5
performance_warmup = 2
