business_rules:
  version: "1.0"
  created_at: "2025-10-18T00:00:00Z"
  created_by: "ia-business-analyst"
  project: "ConciliaAI"
  
  categories:
    - category: "Matching"
      description: "Regras para reconciliar venda com transação da adquirente"
      priority: "P0"
      
      rules:
        - rule_id: "BR-001"
          name: "Exact Match"
          description: "Match exato por NSU, valor e data"
          priority: "P0"
          confidence: 1.00
          criteria:
            - "sale.nsu == transaction.nsu"
            - "sale.amount == transaction.amount"
            - "sale.date == transaction.transaction_date"
          formula: |
            IF (nsu_match AND amount_match AND date_match) THEN
              confidence = 1.00
              match_type = 'exact'
            END IF
          examples:
            - input:
                sale: { nsu: "123456789", amount: 150.00, date: "2025-01-18" }
                transaction: { nsu: "123456789", amount: 150.00, date: "2025-01-18" }
              output:
                match: true
                match_type: "exact"
                confidence: 1.00

        - rule_id: "BR-002"
          name: "Fuzzy Match - Amount"
          description: "Tolerância de ±R$ 0,50 no valor"
          priority: "P1"
          confidence: 0.95
          criteria:
            - "sale.nsu == transaction.nsu"
            - "abs(sale.amount - transaction.amount) <= 0.50"
            - "sale.date == transaction.transaction_date"
          formula: |
            difference = abs(sale.amount - transaction.amount)
            IF (nsu_match AND difference <= 0.50 AND date_match) THEN
              confidence = 0.95 - (difference / 0.50) * 0.05
              match_type = 'fuzzy_amount'
            END IF
          examples:
            - input:
                sale: { nsu: "123456789", amount: 150.00, date: "2025-01-18" }
                transaction: { nsu: "123456789", amount: 149.75, date: "2025-01-18" }
              output:
                match: true
                match_type: "fuzzy_amount"
                confidence: 0.925
                difference: 0.25

        - rule_id: "BR-003"
          name: "Fuzzy Match - Date"
          description: "Tolerância de ±1 dia na data"
          priority: "P2"
          confidence: 0.90
          criteria:
            - "sale.nsu == transaction.nsu"
            - "sale.amount == transaction.amount"
            - "abs(sale.date - transaction.transaction_date) <= 1 dia"
          formula: |
            date_diff_days = abs(sale.date - transaction.transaction_date)
            IF (nsu_match AND amount_match AND date_diff_days <= 1) THEN
              confidence = 0.90
              match_type = 'fuzzy_date'
            END IF
          notes:
            - "Requer revisão humana quando aplicado"
          examples:
            - input:
                sale: { nsu: "123456789", amount: 150.00, date: "2025-01-18" }
                transaction: { nsu: "123456789", amount: 150.00, date: "2025-01-19" }
              output:
                match: true
                match_type: "fuzzy_date"
                confidence: 0.90

        - rule_id: "BR-004"
          name: "Installment Match"
          description: "Match de transação parcelada"
          priority: "P1"
          confidence: 0.98
          criteria:
            - "sale.nsu == transaction.nsu"
            - "sale.amount == transaction.installment_amount * transaction.total_installments"
          formula: |
            calculated_total = transaction.installment_amount * transaction.total_installments
            IF (nsu_match AND sale.amount == calculated_total) THEN
              confidence = 0.98
              match_type = 'installment'
            END IF
          examples:
            - input:
                sale: { nsu: "987654321", amount: 300.00, installments: 3 }
                transaction: { installment_amount: 100.00, total_installments: 3 }
              output:
                match: true
                confidence: 0.98
                match_type: "installment"

        - rule_id: "BR-005"
          name: "Multiple Payments Match"
          description: "Venda paga com múltiplos cartões"
          priority: "P2"
          confidence: 0.85
          criteria:
            - "Multiple transactions within 5min window"
            - "sum(transactions.amount) == sale.amount"
          requires_human_review: true

    - category: "MDR Calculation"
      description: "Cálculo de taxa MDR esperada por adquirente"
      priority: "P0"
      
      rules:
        - rule_id: "BR-010"
          name: "Cielo - Débito"
          acquirer: "cielo"
          payment_type: "debit"
          formula: "mdr_amount = amount * 0.025"
          expected_rate: 0.025
          validation:
            min_rate: 0.020
            max_rate: 0.035

        - rule_id: "BR-011"
          name: "Cielo - Crédito à Vista"
          acquirer: "cielo"
          payment_type: "credit"
          installments: 1
          formula: "mdr_amount = amount * 0.030"
          expected_rate: 0.030

        - rule_id: "BR-012"
          name: "Cielo - Crédito Parcelado"
          acquirer: "cielo"
          payment_type: "credit"
          installments: ">1"
          formula: |
            IF installments <= 6 THEN
              rate = 0.035 + (installments - 1) * 0.002
            ELSE
              rate = 0.045 + (installments - 6) * 0.003
            END IF
            mdr_amount = amount * rate
          validation:
            max_rate: 0.080

        - rule_id: "BR-013"
          name: "Rede - Débito"
          acquirer: "rede"
          payment_type: "debit"
          formula: "mdr_amount = amount * 0.023"
          expected_rate: 0.023

        - rule_id: "BR-014"
          name: "Stone - Taxas Progressivas"
          acquirer: "stone"
          description: "Taxa baseada em volume mensal"
          tiers:
            - tier: "0-10k/mês"
              debit_rate: 0.028
              credit_rate: 0.035
            - tier: "10k-50k/mês"
              debit_rate: 0.025
              credit_rate: 0.032
            - tier: "50k+/mês"
              debit_rate: 0.022
              credit_rate: 0.029
          formula: |
            monthly_volume = get_monthly_volume(merchant_id)
            tier = determine_tier(monthly_volume)
            rate = tier.debit_rate IF payment_type == 'debit' ELSE tier.credit_rate
            mdr_amount = amount * rate

    - category: "Anomaly Detection"
      description: "Detecção de divergências financeiras"
      priority: "P0"
      
      rules:
        - rule_id: "BR-020"
          name: "MDR Variance"
          description: "Taxa cobrada diverge do esperado"
          severity_matrix:
            critical: "> 20% variance"
            high: "10-20% variance"
            medium: "5-10% variance"
            low: "< 5% variance"
          action:
            critical: "ALERT + CONTESTATION_SUGGESTION"
            high: "ALERT"

        - rule_id: "BR-021"
          name: "Missing Transaction"
          description: "Venda sem transação após prazo"
          timing_rules:
            alert_d7:
              severity: "medium"
              action: "Verificar com adquirente"
            alert_d30:
              severity: "high"
              action: "Escalação - possível perda"
            alert_d90:
              severity: "critical"
              action: "Perda confirmada"

        - rule_id: "BR-022"
          name: "Unauthorized Chargeback"
          description: "Chargeback não autorizado"
          severity: "critical"
          contestation_window: "30 days"
          required_evidence:
            - "Comprovante de venda assinado"
            - "Nota fiscal"
            - "Comprovante de entrega"

        - rule_id: "BR-023"
          name: "Settlement Delay"
          description: "Pagamento atrasado"
          severity_matrix:
            critical: "delay > 30 days"
            high: "delay 15-30 days"
            medium: "delay 7-15 days"

        - rule_id: "BR-024"
          name: "Duplicate Transaction"
          description: "Mesma transação processada múltiplas vezes"
          severity: "high"
          criteria:
            - "Same NSU + amount + date"
            - "NOT installment plan"

    - category: "Chargeback Handling"
      description: "Processamento de chargebacks"
      priority: "P1"
      
      rules:
        - rule_id: "BR-030"
          name: "Chargeback Classification"
          categories:
            fraud:
              win_rate: 0.15
              required_evidence: ["comprovante_assinado", "id_validation"]
            not_delivered:
              win_rate: 0.45
              required_evidence: ["tracking_number", "delivery_confirmation"]
            defective_product:
              win_rate: 0.60
            duplicate_charge:
              win_rate: 0.80

        - rule_id: "BR-031"
          name: "Chargeback Cost-Benefit"
          formula: |
            cost_to_contest = 50.00 + lawyer_hours * 200.00
            expected_recovery = amount * win_probability
            net_benefit = expected_recovery - cost_to_contest
            recommend = 'CONTEST' IF net_benefit > 0

metadata:
  total_rules: 24
  categories: 4
