openapi: 3.1.0

info:
  title: {{SERVICE_NAME}} API
  version: 1.0.0
  description: |
    API para gerenciamento de {{DOMAIN}}
  contact:
    name: BuildToValue Squad
    email: squad@company.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.company.com/v1
    description: Production
  - url: https://staging-api.company.com/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local Development

tags:
  - name: {{DOMAIN}}
    description: Operações de {{DOMAIN}}

paths:
  /{{resource}}:
    get:
      operationId: list{{Resource}}
      summary: Listar {{resource}}
      tags: [{{DOMAIN}}]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            example: "createdAt,desc"
      responses:
        '200':
          description: Lista de {{resource}}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/{{Resource}}Page'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - bearerAuth: []
    
    post:
      operationId: create{{Resource}}
      summary: Criar novo {{resource}}
      tags: [{{DOMAIN}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Create{{Resource}}Request'
      responses:
        '201':
          description: {{Resource}} criado com sucesso
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: URI do recurso criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/{{Resource}}'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - bearerAuth: []
  
  /{{resource}}/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      operationId: get{{Resource}}ById
      summary: Buscar {{resource}} por ID
      tags: [{{DOMAIN}}]
      responses:
        '200':
          description: {{Resource}} encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/{{Resource}}'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - bearerAuth: []
    
    put:
      operationId: update{{Resource}}
      summary: Atualizar {{resource}}
      tags: [{{DOMAIN}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Update{{Resource}}Request'
      responses:
        '200':
          description: {{Resource}} atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/{{Resource}}'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - bearerAuth: []
    
    delete:
      operationId: delete{{Resource}}
      summary: Deletar {{resource}}
      tags: [{{DOMAIN}}]
      responses:
        '204':
          description: {{Resource}} deletado com sucesso
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - bearerAuth: []

components:
  schemas:
    {{Resource}}:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [ACTIVE, INACTIVE, PENDING]
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    
    Create{{Resource}}Request:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
    
    Update{{Resource}}Request:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
    
    {{Resource}}Page:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/{{Resource}}'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
    
    ErrorResponse:
      type: object
      required: [message, code, timestamp]
      properties:
        message:
          type: string
          description: Mensagem de erro amigável
        code:
          type: string
          description: Código de erro interno
        timestamp:
          type: string
          format: date-time
        details:
          type: array
          items:
            type: string
  
  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Conflict:
      description: Conflito (recurso já existe)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtido via /auth/login
