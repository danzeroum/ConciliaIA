services:
  postgres:
    image: postgres:16-alpine
    container_name: conciliaai-postgres
    environment:
      POSTGRES_DB: conciliaai
      POSTGRES_USER: btv_user
      POSTGRES_PASSWORD: btv_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btv_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: conciliaai-postgres-test
    environment:
      POSTGRES_DB: conciliaai_test
      POSTGRES_USER: btv_user
      POSTGRES_PASSWORD: btv_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btv_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: conciliaai-backend
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://btv_user:btv_password@postgres:5432/conciliaai
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: btv_user
      POSTGRES_PASSWORD: btv_password
      POSTGRES_DB: conciliaai
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./requirements-dev.txt:/app/requirements-dev.txt

volumes:
  postgres_data:
