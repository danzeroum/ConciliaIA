services:
  postgres:
    image: postgres:15-alpine
    container_name: buildtovalue-postgres
    environment:
      POSTGRES_DB: buildtovalue
      POSTGRES_USER: btv_user
      POSTGRES_PASSWORD: btv_password
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btv_user -d buildtovalue"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildtovalue-network

  backend:
    build: .
    container_name: conciliaai-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://btv_user:btv_password@postgres:5432/buildtovalue
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: btv_user
      POSTGRES_PASSWORD: btv_password
      POSTGRES_DB: buildtovalue
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - buildtovalue-network
    restart: unless-stopped

networks:
  buildtovalue-network:
    driver: bridge

volumes:
  postgres_data:
