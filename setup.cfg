[flake8]
# Pragmatic style gate: enforce correctness codes (pyflakes F*, key E9/E7)
# while tolerating purely cosmetic differences. Line length is capped at 120.
max-line-length = 120
extend-ignore =
    E203,
    W503,
    E501,
    W291,
    W293,
    W391,
    W292,
    E302,
    E305,
    E303,
    E261,
    E262,
    E251,
    E231,
    E241,
    E126,
    E127,
    E128,
    E131,
    E402
exclude =
    .git,
    __pycache__,
    alembic/versions,
    build,
    dist,
    .venv,
    venv
